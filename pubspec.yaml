name: supermarket
description: A new Flutter project.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.4.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  easy_localization: 3.0.8
  flutter_spinkit: ^5.2.1
  get_it: ^8.0.3
  bloc: ^9.0.0
  flutter_bloc: ^9.1.0
  connectivity_plus: ^6.1.3
  equatable: ^2.0.7
  dio: ^5.8.0+1
  dartz: ^0.10.1
  intl: ^0.19.0
  flutter_svg: ^2.0.17
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.3
  email_validator: ^3.0.0
  font_awesome_flutter: ^10.8.0
  # gradient_ui: ^1.1.0
  pretty_dio_logger: ^1.4.0
  intl_phone_field: ^3.2.0
  google_sign_in: ^6.3.0
  flutter_dotenv: ^5.2.1
  injectable: ^2.5.0
  json_annotation: ^4.9.0
  go_router: ^14.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.15
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0
  flutter_gen: ^5.9.0
  flutter_gen_runner: ^5.9.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/translations/

flutter_gen:
  output: lib/core/presentation/utils/generated/generated_assets/
  integrations:
    flutter_svg: true

